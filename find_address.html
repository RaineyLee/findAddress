<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>주소 검색</title>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #layer {
            width: 100%;
            height: 100%;
            position: relative;
        }
    </style>
</head>
<body>
    <div id="layer"></div>

    <script>
        // 안드로이드 앱에서 호출할 함수
        function execKakaoPostcode() {
            var element_layer = document.getElementById('layer');

            new daum.Postcode({
                oncomplete: function(data) {
                    // 주소 변수 (기본값: 도로명 주소)
                    var fullAddr = data.roadAddress; 
                    var extraAddr = ''; 

                    // 법정동명이 있을 경우 추가 (예: 역삼동)
                    if(data.bname !== '' && /[동|로|가]$/g.test(data.bname)){
                        extraAddr += data.bname;
                    }
                    // 건물명이 있고, 공동주택일 경우 추가 (예: 푸르지오 아파트)
                    if(data.buildingName !== '' && data.apartment === 'Y'){
                        extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                    }
                    
                    // 상세 주소가 있다면 괄호로 묶어서 합침
                    if(extraAddr !== ''){
                        extraAddr = ' (' + extraAddr + ')';
                    }

                    // [안드로이드 통신] 
                    // BridgeInterface에서 정의한 "processAddress" 함수를 호출합니다.
                    if (window.Android && window.Android.processAddress) {
                        // 첫 번째 인자: 기본 주소, 두 번째 인자: 참고 항목(동, 건물명 등)
                        window.Android.processAddress(fullAddr, extraAddr);
                    }
                },
                width : '100%',
                height : '100%',
                maxSuggestItems : 5
            }).embed(element_layer);
        }

        // 페이지 로딩 즉시 실행
        window.onload = function() {
            execKakaoPostcode();
        };
    </script>
</body>
</html>
